<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Quiz Application</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>INTERACTIVE QUIZ APPLICATION</h1>

        <div id="start-screen">
            <button id="start-btn">Start Quiz</button>
            <p class="quote">
  "The future belongs to those who learn more skills and combine them creatively."
</p>
        </div>

        <div id="quiz-box" class="hide">
            <h2 id="question">Question Text</h2>
            <div id="options" class="options"></div>
            <button id="next-btn" class="hide">Next</button>
        </div>

    <div id="result-box" class="hide">
    <h2>Your Score: <span id="score"></span></h2>
    <button id="certificate-btn">Download Certificate</button>
    <button id="restart-btn">Restart Quiz</button>
</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
